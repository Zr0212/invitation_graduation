  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    .figma-wrapper {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      background: #000;
    }

    .figma-wrapper iframe {
      position: absolute;
      left: 50%;
      top: 50%;

      width: calc(100vw + 96px);
      height: calc(100dvh + 120px);

      border: 0;
      display: block;
      background: #000;

      transform: translate(-50%, -50%);
      transform-origin: center center;
    }
  </style>
</head>

<body>
  <div class="figma-wrapper">

      src="https://embed.figma.com/proto/upqAIC9EVA9lW3g1cjTI1u/Untitled?node-id=15-64&scaling=contain&content-scaling=fixed&starting-point-node-id=15%3A64&page-id=0%3A1&embed-host=share&footer=false&hotspot-hints=false&device-frame=false&viewport-controls=false"
